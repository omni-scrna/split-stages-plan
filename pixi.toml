[workspace]
name = "split-stages-plan"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[feature.validation.tasks]
validate-artifacts = "validators/all.sh"

[feature.validation.dependencies]
r-readr = "*"
r-tibble = "*"
python = "*"
h5py = "*"

# Plan validation: omnibenchmark from its main branch.
[feature.plan.dependencies]
python = ">=3.12,<3.14"
pip = "*"
# conda so `ob run` (snakemake --use-conda) has a backend in-env, no system
# conda required. conda ships the fast libmamba solver, so mamba is not needed.
conda = "*"
# mikefarah's yq, used by ci/trim-plan.sh. Keep it in-env so CI never falls back
# to a host-installed snap yq (snap-confine can't run inside the self-hosted
# runner's systemd service cgroup).
go-yq = "*"

[feature.plan.pypi-dependencies]
omnibenchmark = { git = "https://github.com/omnibenchmark/omnibenchmark.git", branch = "main" }

[feature.plan.tasks]
validate-plan = "ob validate plan benchmark_conda.yaml"

[environments]
validation = { features = ["validation"] }
plan = { features = ["plan"] }
