name: Pin commits

# ChatOps bot: comment `/pin-commits` (optionally `/pin-commits <ref>`) to
# dereference each module's branch ref to a concrete SHA (via obflow, over the
# network — no clones).
#
#   - On an existing PR  -> commits the pin straight onto that PR's branch.
#   - On an issue        -> opens a dedicated pin PR (release-please style).

on:
  issue_comment:
    types: [created]

# Serialize so concurrent commands don't race on a branch.
concurrency:
  group: pin-commits-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  PLAN: benchmark_conda.yaml
  PIN_BRANCH: obflow/pin-commits
  OBFLOW_URL: https://github.com/btraven00/obflow/releases/download/nightly/obflow-linux-amd64.tar.gz

jobs:
  pin:
    # Only the slash command, and only from someone with write access.
    if: >-
      startsWith(github.event.comment.body, '/pin-commits') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes

      - name: Parse ref argument
        id: cmd
        env:
          # Via env, never inline — the comment body is attacker-controlled.
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Second whitespace token of "/pin-commits <ref>", empty if omitted.
          ref="$(printf '%s' "$COMMENT_BODY" | awk 'NR==1{print $2}')"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      # Decide where the result lands: onto this PR's branch, or a fresh pin PR.
      - name: Detect context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PR: ${{ github.event.issue.pull_request.url != '' }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          mode=fresh
          head=""
          if [ "$IS_PR" = "true" ]; then
            cross="$(gh pr view "$NUMBER" --repo "${{ github.repository }}" --json isCrossRepository -q .isCrossRepository)"
            if [ "$cross" = "false" ]; then
              # Same-repo PR: we can push to its branch. Otherwise (fork PR) we
              # can't, so fall back to a fresh pin PR.
              mode=pr
              head="$(gh pr view "$NUMBER" --repo "${{ github.repository }}" --json headRefName -q .headRefName)"
            fi
          fi
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"
          echo "head=${head}" >> "$GITHUB_OUTPUT"

      # PR mode: check out the PR branch (push token persisted). Fresh mode:
      # check out the default branch as the base.
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.head || github.event.repository.default_branch }}

      - name: Install obflow
        run: |
          curl -fsSL "$OBFLOW_URL" | tar -xz
          install -m 0755 obflow-linux-amd64 /usr/local/bin/obflow

      # Public omni-scrna modules need no auth for `git ls-remote`. For private
      # modules, set a MODULES_TOKEN secret (a PAT with repo:read); it is wired
      # into git's credential helper here (no-op when the secret is unset).
      - name: Configure git auth for private modules
        env:
          MODULES_TOKEN: ${{ secrets.MODULES_TOKEN }}
        run: |
          if [ -n "$MODULES_TOKEN" ]; then
            git config --global \
              url."https://x-access-token:${MODULES_TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          fi

      - name: Pin commits
        run: |
          ref='${{ steps.cmd.outputs.ref }}'
          if [ -n "$ref" ]; then
            obflow plan pin --remote --ref "$ref" "$PLAN" | tee pin-report.txt
          else
            obflow plan pin --remote "$PLAN" | tee pin-report.txt
          fi

      # --- PR mode: commit straight onto the PR's branch ------------------------
      - name: Commit onto PR branch
        id: commit
        if: steps.ctx.outputs.mode == 'pr'
        run: |
          if git diff --quiet -- "$PLAN"; then
            echo "No changes — already pinned."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$PLAN"
          git commit -m "chore: pin module commits${{ steps.cmd.outputs.ref && format(' ({0})', steps.cmd.outputs.ref) || '' }}"
          git push origin "HEAD:${{ steps.ctx.outputs.head }}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # --- Fresh mode: open/update a dedicated pin PR --------------------------
      - name: Open/update pin PR
        id: cpr
        if: steps.ctx.outputs.mode == 'fresh'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.PIN_BRANCH }}
          base: ${{ github.event.repository.default_branch }}
          commit-message: "chore: pin module commits${{ steps.cmd.outputs.ref && format(' ({0})', steps.cmd.outputs.ref) || '' }}"
          title: "chore: pin module commits"
          labels: pin-commits
          body: Pinning module commits… (report attached below)

      - name: Attach report to pin PR body
        if: steps.ctx.outputs.mode == 'fresh' && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "Dereferenced each module's branch ref to a concrete SHA."
            echo
            echo "Requested by @${{ github.event.comment.user.login }} via \`/pin-commits\`."
            echo
            echo '<details><summary>Resolution report</summary>'
            echo
            echo '```'
            cat pin-report.txt
            echo '```'
            echo
            echo '</details>'
            echo
            echo 'Merge to freeze the plan.'
          } > pr-body.md
          gh pr edit "${{ steps.cpr.outputs.pull-request-number }}" --body-file pr-body.md

      # --- Report back to the commenter ---------------------------------------
      - name: Reply with result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          react() { gh api -X POST "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}/reactions" -f content="$1"; }
          say()   { gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "$1"; }

          if [ "${{ job.status }}" != "success" ]; then
            react "-1"
            say "❌ \`/pin-commits\` failed — see the [run log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            exit 0
          fi

          react "+1"
          if [ "${{ steps.ctx.outputs.mode }}" = "pr" ]; then
            if [ "${{ steps.commit.outputs.pushed }}" = "true" ]; then
              say "📌 Pinned module commits onto this PR's branch (\`${{ steps.ctx.outputs.head }}\`)."
            else
              say "✅ Nothing to pin — every module is already at its resolved SHA."
            fi
          else
            if [ -n "${{ steps.cpr.outputs.pull-request-number }}" ]; then
              say "📌 Pinned module commits → ${{ steps.cpr.outputs.pull-request-url }}"
            else
              say "✅ Nothing to pin — every module is already at its resolved SHA."
            fi
          fi
