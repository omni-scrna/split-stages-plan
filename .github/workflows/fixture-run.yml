name: Fixture run

# Executes a trimmed version of the benchmark (every module, one parameter
# combo each) on the tiny committed fixture in fixtures/DATA. Proves the
# modules still execute and their stage contracts line up, without the 817 MB
# real dataset.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  fixture-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Conda envs for ~8 modules are large; reclaim space on the runner.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          environments: plan
          frozen: false
          locked: false

      - name: Derive trimmed CI plan
        run: ci/trim-plan.sh > benchmark_ci.yaml

      # Cache the per-module conda envs snakemake builds (the slow part).
      # Keyed on the env specs + the omni-data pin so it invalidates on change.
      # Restore-only: we save explicitly after the env build below, so the
      # built envs persist even if the run step later OOMs (a host kill skips
      # the implicit post-cache save).
      - name: Restore module conda envs
        id: conda-cache
        uses: actions/cache/restore@v4
        with:
          path: out_ci/.snakemake/conda
          key: snakemake-conda-${{ runner.os }}-${{ hashFiles('envs/*.yml', 'envs/*.yaml', 'ci/trim-plan.sh') }}
          # Partial restore on an exact-key miss: snakemake reuses every
          # hash-named env that still matches and rebuilds only the changed
          # one(s), instead of re-solving all modules from scratch.
          restore-keys: |
            snakemake-conda-${{ runner.os }}-

      # Build the per-module conda envs without running any module. Isolates an
      # env-build OOM from a module OOM, and gives us a cache to save.
      - name: Build module conda envs
        run: |
          pixi run -e plan ob run benchmark_ci.yaml \
            --unpinned --out-dir out_ci --cores 4 -- --conda-create-envs-only

      - name: Save module conda envs
        if: always() && steps.conda-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: out_ci/.snakemake/conda
          key: snakemake-conda-${{ runner.os }}-${{ hashFiles('envs/*.yml', 'envs/*.yaml', 'ci/trim-plan.sh') }}

      - name: Run trimmed benchmark on fixture
        run: |
          pixi run -e plan ob run benchmark_ci.yaml \
            --unpinned --out-dir out_ci --cores 4

      - name: Summarize outputs
        if: always()
        run: |
          {
            echo "## Fixture run results"
            echo
            echo "Module outputs produced:"
            echo '```'
            find out_ci -type f \
              \( -name '*.h5ad' -o -name '*.h5' -o -name '*.tsv' \
                 -o -name '*.json' -o -name '*.txt.gz' \) \
              -not -path '*/.snakemake/*' | sort
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # tar it ourselves: upload-artifact's globber doesn't reliably descend
      # into hidden dirs (every output sits under .<hash>/ param dirs), and tar
      # also preserves the symlinks under .modules. Exclude the multi-GB built
      # conda envs (cached separately).
      - name: Package run outputs
        if: always()
        run: |
          tar czf fixture-run-out.tar.gz \
            --exclude='out_ci/.snakemake/conda' \
            $( [ -d out_ci ] && echo out_ci ) \
            $( [ -f benchmark_ci.yaml ] && echo benchmark_ci.yaml )

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixture-run-out
          path: fixture-run-out.tar.gz
          retention-days: 7
