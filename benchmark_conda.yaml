name: split-stages-plan
id: split_stages_plan
description: This benchmark lays out stages for each step of an scRNA-seq pipeline
benchmarker: "Mark Robinson <mark.robinson@mls.uzh.ch>"

# Benchmark configuration
version: "0.0.3"

# The default software environment for this benchmark.
# One of: apptainer, conda, envmodules.
software_backend: "conda"

# Available software environments
software_environments:
  r_conda:
    name: R conda env (some packages self built)
    conda: envs/r.yml
  scanpy:
    name: scanpy multi-module
    conda: envs/scanpy.yml
  scrapper:
    name: scrapper multi-module
    conda: envs/scrapper.yml
  seurat:
    name: seurat multi-module
    conda: envs/seurat.yml
  metrics:
    name: metrics env
    conda: envs/metrics.yaml
  py_conda:
    name: Python conda env
    conda: envs/py.yml
  integrate:
    name: integration env
    conda: envs/integrate.yml

stages:
  - id: one-data
    outputs:
      - id: rawdata.h5ad
        path: "{dataset}.h5ad"
      - id: rawdata.clusters_truth
        path: "{dataset}.clusters_truth.tsv"
      - id: rawdata.clusters_truth_num
        path: "{dataset}.clusters_truth_num.txt"
    modules:
      - id: datasets
        name: "R-based dataset downloads"
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/1-data
          commit: 10112c9
        parameters:
          - dataset_name: ["be1"]
            batching: true  
            batch_variable: "cell_line"

  - id: one-data-for-integration
    outputs:
     - id: rawdata.h5ad
        path: "{dataset}.h5ad"
      - id: rawdata.clusters_truth
        path: "{dataset}.clusters_truth.tsv"
      - id: rawdata.clusters_truth_num
        path: "{dataset}.clusters_truth_num.txt"
      - id: batch_info.yaml
        path: "{dataset}_batch_info.yaml"
    modules:
      - id: data-for-integration
        name: "Batch variable identification"
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/one-data-for-integration
          commit: TBD
        parameters:
          - dataset_name: ["be1"]

  - id: two-filter
    inputs:
      - rawdata.h5ad
    outputs:
      - id: filtered.cellids
        path: "{dataset}_cellids.txt.gz"
    modules:
      - id: filtering-r
        name: "R-based cell-level filters"
        software_environment: "r_conda"
        repository:
          url: https://github.com/scrna-bench/2-filter
          commit: ac74749
        parameters:
          - filter_type: ["manual", "scrapper-auto"]
      - id: filtering-py
        name: "Python-based cell-level filters"
        software_environment: "py_conda"
        repository:
          url: https://github.com/omni-scrna/2-filter-py
          commit: "64b89e6"
        parameters:
          - filter_type: ["manual"]

  - id: three-normalize
    inputs:
      - rawdata.h5ad
      - filtered.cellids
    outputs:
      - id: normalized.h5
        path: "{dataset}_normalized.h5"
    modules:
      - id: normalization-r
        name: "R-based scRNA-seq normalization methods"
        software_environment: "r_conda"
        repository:
          url: https://github.com/scrna-bench/3-normalize
          commit: b2fb9f3
        parameters:
          - normalization_type: ["seurat_log1pCP10k", "scuttle_geometricSizeFactors"]
      - id: normalization-py
        name: "Python-based scRNA-seq normalization methods"
        software_environment: "py_conda"
        repository:
          url: https://github.com/omni-scrna/3-normalize-py
          commit: "6a95673"
        parameters:
          - normalization_type: ["scanpy_log1pCP10k"]

  - id: four-select
    inputs:
      - rawdata.h5ad
      - normalized.h5
      - filtered.cellids
    outputs:
      - id: normalized_selected.h5
        path: "{dataset}_normalized_selected.h5"
    modules:
      - id: selection-seurat
        name: "Seurat-based scRNA-seq gene selection methods"
        software_environment: "seurat"
        repository:
          url: https://github.com/omni-scrna/seurat
          commit: 4c9ce1d
          entrypoint: select
        parameters:
          - selection_type: ["seurat_vst", "seurat_vst_batch"]
            number_selected: 2000
            batch_variable: ["cell_line"] # this can only be used for sc-mix and it doesn't make sense
      - id: selection-scrapper
        name: "Scrapper-based gene selection"
        software_environment: "scrapper"
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 11abd40
          entrypoint: select
        parameters:
          - number_selected: 2000
      # - id: selection-py
      #   name: "Python-based scRNA-seq gene selection methods"
      #   software_environment: "py_conda"
      #   repository:
      #     url: https://github.com/omni-scrna/4-select-py
      #     commit: "19e5811"
      #   parameters:
      #     - selection_type: ["scanpy_hvg", "pearson_residuals"]
      #       number_selected: 2000

  - id: four-select-per-batch
    inputs:
      - rawdata.h5ad
      - normalized.h5
      - filtered.cellids
      - batch_info.yaml
    outputs:
      - id: normalized_selected.h5
        path: "{dataset}_normalized_selected.h5"
    modules:
      - id: selection-seurat-per-batch
        name: "Seurat per-batch VST selection"
        software_environment: "seurat"
        repository:
          url: https://github.com/omni-scrna/seurat
          commit: TBD
          entrypoint: select
        parameters:
          - selection_type: ["seurat_vst_batch"]
            number_selected: 2000

  - id: five-pca
    resources:
      cores: 4
    inputs:
      - normalized_selected.h5
    outputs:
      - id: pcas.tsv
        path: "{dataset}_pcas.tsv"
        # TODO: this needs https://github.com/omnibenchmark/omnibenchmark/pull/323 merged to work
        # path: "{name}_{params.solver}_n_{params.n_components}.h5"
    modules:
      - id: pca-scanpy
        name: "scanpy PCA"
        software_environment: "scanpy"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: graphs
          entrypoint: pca
        parameters:
          - solver: [arpack, randomized]
            n_components: 50
            random_seed: 42
      - id: pca-scrapper
        name: "scrapper PCA"
        software_environment: "scrapper"
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 5c93b1e
          entrypoint: pca
        parameters:
          - solver: [exact, irlba, random]
            n_components: 50
            random_seed: 42

  - id: five-pca-per-batch
    resources:
      cores: 4
    inputs:
      - normalized_selected.h5
      - rawdata.h5ad
      - batch_info.yaml
    outputs:
      - id: pcas_per_batch.tsv
        path: "{dataset}_pcas_per_batch.tsv"
      - id: loadings_per_batch.h5
        path: "{dataset}_loadings_per_batch.h5"
    modules:
      - id: pca-per-batch-scrapper
        name: "scrapper PCA per batch"
        software_environment: scrapper
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: TBD
          entrypoint: pca
        parameters:
          - solver: [irlba]
            n_components: 50
            random_seed: 42
            per_batch: true
      - id: pca-per-batch-scanpy
        name: "scanpy PCA per batch"
        software_environment: scanpy
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: TBD
          entrypoint: pca
        parameters:
          - solver: [arpack, randomized]
            n_components: 50
            random_seed: 42
            per_batch: true

  - id: six-embedding-metrics
    inputs:
      - pcas.tsv
      - rawdata.clusters_truth
    outputs:
      - id: embedding_metrics
        path: "{dataset}_embedding_metrics.json"
    modules:
      - id: embedding-metrics-py
        name: "Embedding quality metrics in python"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 0d0050e
          entrypoint: embedding-py
      - id: embedding-metrics-r
        name: "Embedding quality metrics in R"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 0d0050e
          entrypoint: embedding-r

  - id: graph
    inputs:
      - pcas.tsv
    outputs:
      - id: neighbors.h5
        path: "{dataset}_neighbors.h5"
    modules:
      - id: graph-scanpy
        name: "scanpy KNN graph"
        software_environment: "scanpy"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: graphs
          entrypoint: knn
        parameters:
          - n_neighbors: 15
            random_seed: 42
            flavor: "umap"

  # TODO: re-enable once metrics R module reads the bundled neighbors.h5
  # - id: graph-metrics
  #   inputs:
  #     - distances.h5
  #     - rawdata.clusters_truth
  #   outputs:
  #     - id: graph_metrics
  #       path: "{dataset}_graph_metrics.json"
  #   modules:
  #     - id: graph-metrics-r
  #       name: "Graph quality metrics in R"
  #       software_environment: "metrics"
  #       repository:
  #         url: https://github.com/omni-scrna/metrics
  #         commit: 0d0050e
  #         entrypoint: graph-r

  - id: cluster
    inputs:
      - neighbors.h5
    outputs:
      - id: clusters.tsv
        path: "{dataset}_clusters.tsv"
    modules:
      - id: cluster-scanpy
        name: "scanpy Leiden clustering"
        software_environment: "scanpy"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: graphs
          entrypoint: cluster
        parameters:
          - resolution: [0.5, 1.0]
            random_seed: 42

  - id: cluster-metrics
    inputs:
      - clusters.tsv
      - rawdata.clusters_truth
    outputs:
      - id: cluster_metrics
        path: "{dataset}_cluster_metrics.json"
    modules:
      - id: cluster-metrics-r
        name: "Partition metrics in R"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 0d0050e
          entrypoint: cluster-r

  - id: seven-integrate
    inputs:
      - pcas.tsv
      - rawdata.h5ad
      - batch_info.yaml
      - pcas_per_batch.tsv
      - loadings_per_batch.h5
      - normalized_selected.h5
    outputs:
      - id: corrected.tsv
        path: "{dataset}_corrected.tsv"
    modules:
      - id: integration-harmony
        name: "Harmony batch correction"
        software_environment: "integrate"
        repository:
          url: https://github.com/omni-scrna/7-integrate
          commit: TBD
          entrypoint: harmony-r
        parameters:
          - theta: [0.1, 0.2]
      - id: integration-seurat-rpca
        name: "Seurat RPCA batch correction"
        software_environment: "seurat"
        repository:
          url: https://github.com/omni-scrna/seurat
          commit: TBD
          entrypoint: rpca
        parameters:
          - dims: [30]
            k_anchor: [5]

