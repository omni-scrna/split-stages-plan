name: split-stages-plan
id: split_stages_plan
description: This benchmark lays out stages for each step of an scRNA-seq pipeline
benchmarker: "Mark Robinson <mark.robinson@mls.uzh.ch>"

# Benchmark configuration
version: "0.0.3"

# The default software environment for this benchmark.
# One of: apptainer, conda, envmodules.
software_backend: "conda"

# Available software environments

software_environments:
    r_conda:
        name: R conda env (some packages self built)
        conda: envs/r.yml
    scanpy:
        name: scanpy multi-module
        conda: envs/scanpy.yml
    scrapper:
        name: scrapper multi-module
        conda: envs/scrapper.yml

stages:
  - id: one-data
    outputs:
      - id: rawdata.h5ad
        path: "{dataset}.h5ad"
      - id: rawdata.clusters_truth
        path: "{dataset}.clusters_truth.tsv"
      - id: rawdata.clusters_truth_num
        path: "{dataset}.clusters_truth_num.txt"
    modules:
      - id: datasets
        name: "R-based dataset downloads"
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/1-data
          commit: "1556e23"
        parameters:
          - dataset_name: ["sc-mix"]

  - id: two-filter
    inputs:
      - rawdata.h5ad
    outputs:
      - id: filtered.cellids
        path: "{dataset}_cellids.txt.gz"
    modules:
      - id: filtering-r
        name: "R-based cell-level filters"
        software_environment: "r_conda"
        repository:
          url: https://github.com/omni-scrna/2-filter
          commit: "75b7cea"
        parameters:
          - filter_type: ["manual", "scrapper-auto"]

  - id: three-normalize
    inputs:
      - rawdata.h5ad
      - filtered.cellids
    outputs:
      - id: normalized.h5
        path: "{dataset}_normalized.h5"
    modules:
      - id: normalization-r
        name: "R-based scRNA-seq normalization methods"
        software_environment: "r_conda"
        repository:
          url: https://github.com/omni-scrna/3-normalize
          commit: "1894cf3"
        parameters:
          - normalization_type: ["seurat_log1pCP10k", "scuttle_geometricSizeFactors"]

  - id: four-select
    inputs:
      - normalized.h5
    outputs:
      - id: selected.genes
        path: "{dataset}_selected.txt.gz"
    modules:
      - id: selection-r
        name: "R-based scRNA-seq gene selection methods"
        software_environment: "r_conda"
        repository:
          url: https://github.com/omni-scrna/4-select
          commit: "6cd1817"
        parameters:
          - selection_type: ["seurat_vst", "scrapper_modelGeneVariances"]
            number_selected: 2000

  - id: five-pca
    resources:
      cores: 4
    inputs:
      - normalized.h5
      - selected.genes
    outputs:
      - id: pca
        path: "{dataset}_pca.h5"
        # TODO: this needs https://github.com/omnibenchmark/omnibenchmark/pull/323 merged to work
        # path: "{name}_{params.solver}_n_{params.n_components}.h5"
    modules:
      - id: pca-scanpy
        name: "scanpy PCA"
        software_environment: "scanpy"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: main
          entrypoint: pca
        parameters:
          - solver: [arpack, randomized]
            n_components: 50
            random_seed: 42
      - id: pca-scrapper
        name: "scrapper PCA"
        software_environment: "scrapper"
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: main
          entrypoint: pca
        parameters:
          - solver: [exact, irlba, random]
            n_components: 50
            random_seed: 42
          - solver: [exact, irlba, random]
            n_components: 50
            random_seed: 42

  - id: six-viz
    inputs:
      - pca
    outputs:
      - id: viz.components
        path: "{dataset}_components.txt.gz"
    modules:
      - id: viz-r
        name: R-based non-linear embeddings
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/6-viz
          commit: "b95d31e"
        parameters:
          - perplexity: 30

