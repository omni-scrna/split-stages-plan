name: split-stages-plan
id: split_stages_plan
description: This benchmark lays out stages for each step of an scRNA-seq pipeline
benchmarker: "Mark Robinson <mark.robinson@mls.uzh.ch>"

# Benchmark configuration
version: "0.0.3"
api_version: "0.4.0"

provenance:
  canonical_url: https://raw.githubusercontent.com/omni-scrna/split-stages-plan/refs/heads/main/benchmark_conda.yaml

# Remote artifact storage
storage:
  api: S3
  endpoint: https://omnibenchmark.mls.uzh.ch
  bucket_name: split-stages-plan

# The default software environment for this benchmark.
# One of: apptainer, conda, envmodules.
software_backend: "conda"

# Available software environments
software_environments:
  r_conda:
    name: R conda env (some packages self built)
    conda: envs/r.yml
  scanpy:
    name: scanpy multi-module
    conda: envs/scanpy.yml
  scrapper:
    name: scrapper multi-module
    conda: envs/scrapper.yml
  seurat:
    name: seurat multi-module
    conda: envs/seurat.yml
  metrics:
    name: metrics env
    conda: envs/metrics.yaml
  py_conda:
    name: Python conda env
    conda: envs/py.yml
  integrate:
    name: integration env
    conda: envs/integrate.yml
  annotate:
    name: annotate env
    conda: envs/annotate.yml
  integrate-py:
    name: integration env
    conda: envs/integrate-py.yml
  count-factor:
    name: count-factor
    conda: envs/cntfct.yml


stages:
  - id: DATA
    outputs:
      - id: rawdata_h5ad
        path: "{dataset}.h5ad"
      - id: rawdata_clusters_truth
        path: "{dataset}.clusters_truth.tsv"
      - id: rawdata_clusters_truth_num
        path: "{dataset}.clusters_truth_num.txt"
      - id: properties_info
        path: "{dataset}_properties.yaml"
    modules:
      - id: d-integration
        name: "R-based dataset downloads (integration collection)"
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/1-data
          commit: dd08c17
        parameters:
          - dataset_name: "be1"
            batch_var: Sample
            labels_var: clusters.truth
            sample_var: Sample
          - dataset_name: "pancreas"
            batch_var: study
            labels_var: clusters.truth
            sample_var: study
      - id: d-pca
        name: "R-based dataset downloads (PCA collection)"
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/1-data
          commit: 14c5ddd
        parameters:
          - dataset_name: "sc-mix"
            batch_var: null
            labels_var: cell_line
            sample_var: null
      - id: d-feat-sel
        name: "R-based dataset downloads (feature selection collection)"
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/1-data
          commit: 14c5ddd
        parameters:
          - dataset_name: "be1-subset"
            batch_var: Sample
            labels_var: Sample
            sample_var: Sample
      - id: d-annotation
        name: "R-based dataset downloads (cell type annotation collection)"
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/1-data
          commit: 0346bd4
        parameters:
          - dataset_name: "cb"
            batch_var: species
            labels_var: celltype
            sample_var: species

  - id: FILT
    inputs:
      - rawdata_h5ad
      - properties_info
    outputs:
      - id: filtered_cellids
        path: "{dataset}_cellids.txt.gz"
    modules:
      - id: fi-scrapper
        name: "scrapper-style filtering"
        software_environment: "scrapper"
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 18843a7
          entrypoint: filter

  - id: NORM
    inputs:
      - rawdata_h5ad
      - filtered_cellids
    outputs:
      - id: normalized_h5
        path: "{dataset}_normalized.h5"
    modules:
      - id: nr-scrapper
        name: "scrapper-based normalization"
        software_environment: "scrapper"
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 18843a7
          entrypoint: normalize
      - id: nr-scanpy
        name: "Python-based scRNA-seq normalization methods"
        software_environment: "py_conda"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: 997b888
          entrypoint: normalize
        parameters:
          - flavor: ["log1pCP10k", "analyticalPearsonResiduals"]

  - id: FEAT
    inputs:
      - rawdata_h5ad
      - normalized_h5
      - filtered_cellids
      - properties_info
    outputs:
      - id: normalized_selected_h5
        path: "{dataset}_normalized_selected.h5"
    modules:
      - id: fe-seurat
        name: "seurat-based gene selection"
        software_environment: "seurat"
        exclude:
          - d-pca
        repository:
          url: https://github.com/omni-scrna/seurat
          commit: ac9c9f5
          entrypoint: select
        parameters:
          - selection_type: ["seurat_vst", "seurat_vst_batch"]
            number_selected: 2000
      - id: fe-scrapper
        name: "scrapper-based gene selection"
        software_environment: "scrapper"
        exclude:
          - d-pca
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 18843a7
          entrypoint: select
        parameters:
          - number_selected: 2000
      - id: fe-scanpy
        name: "scanpy-based gene selection"
        software_environment: "scanpy"
        exclude:
          - d-pca
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: 0d684f8
          entrypoint: feat-select
        parameters:
          - flavor: ["pearson_residuals"]
            number_selected: 2000
          #- flavor: ["pearson_residuals", "scanpy_seurat", "scanpy_cell_ranger"]

  - id: PCA
    resources:
      cores: 4
    inputs:
      - normalized_selected_h5
    outputs:
      - id: pcas_tsv
        path: "{dataset}_pcas.tsv"
      - id: loadings_tsv
        path: "{dataset}_loadings.tsv"
    modules:
      - id: pc-scanpy
        name: "scanpy PCA"
        software_environment: "scanpy"
        exclude:
          - d-feat-sel
          - d-annotation
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: 53eb292
          entrypoint: pca
        parameters:
          - solver: [arpack, randomized]
            n_components: 50
            random_seed: 42
      - id: pc-scrapper
        name: "scrapper PCA"
        software_environment: "scrapper"
        exclude:
          - d-feat-sel
          - d-annotation
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 18843a7
          entrypoint: pca
        parameters:
          - solver: [exact, irlba, random]
            n_components: 50
            random_seed: 42

  - id: EMBED-M
    inputs:
      - pcas_tsv
      - rawdata_clusters_truth
    outputs:
      - id: embedding_metrics
        path: "{dataset}_embedding_metrics.json"
    modules:
      - id: em-metrics-r
        name: "Embedding metrics in R"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 4cfb831
          entrypoint: embedding-r
      #- id: em-metrics-py
      #  name: "Embedding metrics in python"
      #  software_environment: "metrics"
      #  repository:
      #    url: https://github.com/omni-scrna/metrics
      #    commit: main 
      #    entrypoint: embedding-py


  - id: NNG
    inputs:
      - pcas_tsv
    outputs:
      - id: neighbors_h5
        path: "{dataset}_neighbors.h5"
    modules:
      - id: nn-scanpy
        name: "scanpy KNN graph"
        software_environment: "scanpy"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: 53eb292
          entrypoint: knn
        parameters:
          - n_neighbors: 15
            random_seed: 42
            flavor: "umap"

  - id: GRAPH-M
    inputs:
      - neighbors_h5
      - rawdata_clusters_truth
    outputs:
      - id: graph_metrics
        path: "{dataset}_graph_metrics.json"
    modules:
      - id: nn-metrics-r
        name: "Graph metrics in R"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 646f1e4
          entrypoint: graph-r

  - id: CLUST
    inputs:
      - neighbors_h5
    outputs:
      - id: clusters_tsv
        path: "{dataset}_clusters.tsv"
    modules: 
      - id: cl-scanpy
        name: "scanpy Leiden clustering"
        software_environment: "scanpy"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: 7cf3472
          entrypoint: cluster
        parameters:
          - flavor: ["igraph", "leidenalg"]
            resolution: [0.5, 1.0]
            random_seed: 42
      - id: cl-seurat
        name: "Seurat clustering"
        software_environment: "seurat"
        repository:
          url: https://github.com/omni-scrna/seurat
          commit: 537d178
          entrypoint: cluster
        parameters:
          - resolution: [0.5, 1.0]
            random_seed: 42
            flavor: ["leiden", "louvain_original"]
        #repository:
        #  url: https://github.com/omni-scrna/seurat
        #  commit: add-clustering
        #  entrypoint: clustering
        #parameters:
        #  - modularity_algorithm: ["louvain_original"]
        #    resolution: [0.5, 1.0]
        #    random_seed: 42
        #  #- modularity_algorithm: ["louvain_original", "louvain_multilevel_refinement", "slm", "leiden"]
      - id: cl-scrapper
        name: "Scrapper clustering"
        software_environment: "scrapper"
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 8a1cfd8
          entrypoint: cluster
        parameters:
          - flavor: ["leiden_modularity", "leiden_cpm", "multilevel", "walktrap"]
            resolution: [0.5, 1.0]
            walktrap_steps: [2, 4]
            random_seed: 42
        
  - id: CLUST-M
    inputs:
      - clusters_tsv
      - rawdata_clusters_truth
    outputs:
      - id: cluster_metrics
        path: "{dataset}_cluster_metrics.json"
    modules:
      - id: cl-metrics-r
        name: "Partition metrics in R"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 257c952
          entrypoint: cluster-r

  - id: INTG8
    inputs:
      - pcas_tsv
      - loadings_tsv
      - normalized_selected_h5
      - rawdata_h5ad
      - properties_info
    outputs:
      - id: corrected_tsv
        path: "{dataset}_corrected.tsv"
    modules:
      - id: in-harmony
        name: "Harmony batch correction"
        software_environment: "integrate"
        exclude:
          - d-pca
          - d-annotation
          - d-feat-sel
        repository:
          url: https://github.com/omni-scrna/7-integrate
          commit: d42312a
          entrypoint: harmony-r
        parameters:
          - theta: [0.1, 2]
      - id: in-seurat
        name: "Seurat IntegrateLayers batch correction"
        software_environment: "seurat"
        exclude:
          - d-pca
          - d-annotation
          - d-feat-sel
        repository:
          url: https://github.com/omni-scrna/seurat
          commit: ccb7018
          entrypoint: integrate
        parameters:
          - method: [rpca]
            k_anchor: [5, 20]
      - id: in-scanorama
        name: "Scanorama batch correction"
        software_environment: "integrate-py"
        exclude:
          - d-pca
          - d-annotation
          - d-feat-sel
        repository:
          url: https://github.com/omni-scrna/7-integrate-py
          commit: 73e3340
          entrypoint: scanorama
        parameters:
          - knn: [20]
            sigma: [15]

  - id: INTG8-M
    inputs:
      - corrected_tsv
      - rawdata_clusters_truth
      - rawdata_h5ad
      - properties_info
      - pcas_tsv
      - clusters_corrected_tsv
    outputs:
      - id: integration_metrics
        path: "{dataset}_integration_metrics.json"
    modules:
      - id: in-metrics-r
        name: "Integration metrics in R"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 4cfb831
          entrypoint: integration-r
        parameters:
          - k: 20          # knn size for CellMixS cms/entropy/isi (evalIntegration)
            n_dim: 10      # corrected-embedding dims used as the CellMixS subspace
            cell_min: 10   # min cells per batch for cms's Anderson-Darling test
            ldf_k: 75      # knn size for CellMixS ldfDiff (matches ldfDiff's own default)
            ldf_n_dim: 20  # pre/post dims used for ldfDiff's LDF subspace (matches ldfDiff's own default)
      - id: in-metrics-py
        name: "Integration metrics in python (scib-metrics + sklearn)"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 4cfb831
          entrypoint: integration-py
        parameters:
          - n_neighbors: 90  # knn graph size for clisi_knn (pynndescent)
            random_state: 0 # random seed for the pynndescent approximate KNN search

  - id: NNG-C
    inputs:
      - corrected_tsv
    outputs:
      - id: neighbors_corrected_h5
        path: "{dataset}_neighbors.h5"
    modules:
      - id: nn-scanpy-c
        name: "scanpy KNN graph (corrected embedding)"
        software_environment: "scanpy"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: a8cc334
          entrypoint: knn
        parameters:
          - n_neighbors: 15
            random_seed: 42
            flavor: "umap"

  - id: CLUST-C
    inputs:
      - neighbors_corrected_h5
    outputs:
      - id: clusters_corrected_tsv
        path: "{dataset}_clusters.tsv"
    modules:
      - id: cl-scanpy-c
        name: "scanpy Leiden clustering (corrected embedding)"
        software_environment: "scanpy"
        repository:
          url: https://github.com/omni-scrna/scanpy
          commit: a8cc334
          entrypoint: cluster
        parameters:
          - flavor: ["igraph", "leidenalg"]
            resolution: [0.5, 1.0]
            random_seed: 42

  - id: CLUST-E
    inputs:
      - pcas_tsv
    outputs:
      - id: clusters_embedding_tsv
        path: "{dataset}_clusters.tsv"
    modules:
      - id: cluster-optics
        name: "scikit-learn OPTICS clustering"
        software_environment: "py_conda"
        repository:
          url: https://github.com/omni-scrna/clustering-py
          commit: 640c243
          entrypoint: cluster
        parameters:
          - min_samples: [10, 30, 50]
            algorithm: ["ball_tree", "kd_tree", "brute"]
            metric: ["euclidean", "manhattan"]
            cluster_method: "xi"
            xi: 0.05
            random_seed: 42
          - min_samples: [10, 30, 50]
            algorithm: "brute"
            metric: "cosine"
            cluster_method: "xi"
            xi: 0.05
            random_seed: 42

  - id: ANNO
    inputs:
    - normalized_selected_h5
    outputs:
    - id: annotations_tsv
      path: '{dataset}_annotations.tsv'
    modules:
    - id: an-singler
      name: singler annotation
      software_environment: annotate
      repository:
        url: https://github.com/omni-scrna/9-annotate
        commit: 439981c
      parameters:
        - reference: ["HumanPrimaryCellAtlasData", "BlueprintEncodeData"]

  - id: ANNO-M
    inputs:
      - annotations_tsv
      - rawdata_clusters_truth
    outputs:
      - id: annotation_metrics
        path: "{dataset}_annotation_metrics.json"
    modules:
      - id: an-metrics-r
        name: "Annotation metrics in R"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 4cfb831
          entrypoint: annotation-r
  - id: CNTFCT
    resources:
      cores: 4
    inputs:
    - normalized_selected_h5
    - rawdata_h5ad
    - filtered_cellids
    outputs:
    - id: factor_scores_tsv
      path: '{dataset}_factor_scores.tsv'
    - id: factor_loadings_tsv
      path: '{dataset}_factor_loadings.tsv'  
    modules:
    - id: cntfct
      name: count-factor
      software_environment: count-factor
      repository:
        url: https://github.com/omni-scrna/count-factor
        commit: 2e7b8e0
      parameters:
      - factorization_type: ["scgbm"]
        n_dim: 4
        random_seed: 42
      #- factorization_type: ["newwave", "scgbm"]
      
