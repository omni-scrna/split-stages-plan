  #           random_seed: 42

  # - id: cluster-metrics
  #   inputs:
  #     - clusters.tsv
  #     - rawdata.clusters_truth
  #   outputs:
  #     - id: cluster_metrics
  #       path: "{dataset}_cluster_metrics.json"
  #   modules:
  #     - id: cluster-metrics-r
  #       name: "Partition metrics in R"
  #       software_environment: "metrics"
  #       repository:
  #         url: https://github.com/omni-scrna/metrics
  #         commit: 0d0050e
  #         entrypoint: cluster-r

  - id: seven-integrate
    inputs:
      - pcas.tsv
      - loadings.tsv
      - normalized_selected.h5
      - rawdata.h5ad
      - properties.info
    outputs:
      - id: corrected.tsv
        path: "{dataset}_corrected.tsv"
    modules:
      - id: integration-harmony
        name: "Harmony batch correction"
        software_environment: "integrate"
        repository:
          url: https://github.com/omni-scrna/7-integrate
          commit: 7a4963a
          entrypoint: harmony-r
        parameters:
          - theta: [0.1, 2]
      - id: integration-seurat
        name: "Seurat IntegrateLayers batch correction"
        software_environment: "seurat"
        repository:
          url: https://github.com/omni-scrna/seurat
          commit: 356b63c
          entrypoint: integrate
        parameters:
          - method: [rpca]
            k_anchor: [5, 20]

  - id: nine-annotate
    inputs:
    - normalized_selected.h5
    outputs:
    - id: annotations
      path: '{dataset}_annotations.tsv'
    modules:
    - id: annotation-singler
      name: singler annotation
      software_environment: annotate
      repository:
        url: https://github.com/omni-scrna/9-annotate
        commit: ba5bfcf
      parameters:
        - reference: ["HumanPrimaryCellAtlasData", "BlueprintEncodeData"]

