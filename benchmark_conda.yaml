name: split-stages-plan
id: split_stages_plan
description: This benchmark lays out stages for each step of an scRNA-seq pipeline
benchmarker: "Mark Robinson <mark.robinson@mls.uzh.ch>"

# Benchmark configuration
version: "0.0.3"

# The default software environment for this benchmark.
# One of: apptainer, conda, envmodules.
software_backend: "conda"

# Available software environments
software_environments:
  r_conda:
    name: R conda env (some packages self built)
    conda: envs/r.yml
  scanpy:
    name: scanpy multi-module
    conda: envs/scanpy.yml
  scrapper:
    name: scrapper multi-module
    conda: envs/scrapper.yml
  seurat:
    name: seurat multi-module
    conda: envs/seurat.yml
  seurat-bpcells:
    name: seurat BPCells variant (r-base 4.4, no anndatar)
    conda: envs/seurat-bpcells.yml
  metrics:
    name: metrics env
    conda: envs/metrics.yaml
  py_conda:
    name: Python conda env
    conda: envs/py.yml
  integrate:
    name: integration env
    conda: envs/integrate.yml
  rapids-singlecell:
    name: rapids-singlecell multi-module
    conda: envs/rapids-singlecell.yml

stages:
  - id: one-data
    outputs:
      - id: rawdata.h5ad
        path: "{dataset}.h5ad"
      - id: rawdata.clusters_truth
        path: "{dataset}.clusters_truth.tsv"
      - id: rawdata.clusters_truth_num
        path: "{dataset}.clusters_truth_num.txt"
    modules:
      - id: datasets
        name: "R-based dataset downloads"
        software_environment: r_conda
        repository:
          url: https://github.com/omni-scrna/1-data
          commit: 10112c9
        parameters:
          - dataset_name: ["be1"]

  - id: two-filter
    inputs:
      - rawdata.h5ad
    outputs:
      - id: filtered.cellids
        path: "{dataset}_cellids.txt.gz"
    modules:
      - id: filtering-py
        name: "Python-based cell-level filters"
        software_environment: "py_conda"
        repository:
          url: https://github.com/omni-scrna/2-filter-py
          commit: "64b89e6"
        parameters:
          - filter_type: ["manual"]

  - id: three-normalize
    inputs:
      - rawdata.h5ad
      - filtered.cellids
    outputs:
      - id: normalized.h5
        path: "{dataset}_normalized.h5"
    modules:
      - id: normalization-py
        name: "Python-based scRNA-seq normalization methods"
        software_environment: "py_conda"
        repository:
          url: https://github.com/omni-scrna/3-normalize-py
          commit: "6a95673"
        parameters:
          - normalization_type: ["scanpy_log1pCP10k"]

  - id: four-select
    inputs:
      - rawdata.h5ad
      - normalized.h5
      - filtered.cellids
    outputs:
      - id: normalized_selected.h5
        path: "{dataset}_normalized_selected.h5"
    modules:
      - id: selection-scrapper
        name: "Scrapper-based gene selection"
        software_environment: "scrapper"
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 11abd40
          entrypoint: select
        parameters:
          - number_selected: 5000

  - id: five-pre-bpcells
    inputs:
      - normalized_selected.h5
    outputs:
      - id: bpcells.tar.gz
        path: "{dataset}_bpcells.tar.gz"
    modules:
      - id: pre-bpcells-seurat
        name: "BPCells format conversion (Seurat)"
        software_environment: "seurat-bpcells"
        repository:
          url: ../split-stages-plan-modules/seurat
          commit: center-only
          entrypoint: bpcells-convert

  - id: five-pca
    resources:
      cores: 4
    inputs:
      - normalized_selected.h5
    outputs:
      - id: pcas.tsv
        path: "{dataset}_pcas.tsv"
        # TODO: this needs https://github.com/omnibenchmark/omnibenchmark/pull/323 merged to work
        # path: "{name}_{params.solver}_n_{params.n_components}.h5"
    modules:
      # Seed sweep is applied only to explicitly randomized/approximate solvers.
      # Deterministic / fully-convergent solvers (exact SVD, IRLBA, ARPACK,
      # IncrementalPCA) keep random_seed: 42 — their seed-independence will be
      # validated in a separate "correctness" run.
      - id: pca-scrapper
        name: "scrapper PCA"
        software_environment: "scrapper"
        repository:
          url: https://github.com/omni-scrna/scrapper
          commit: 5c93b1e
          entrypoint: pca
        parameters:
          - solver: [exact, irlba]
            n_components: 50
            random_seed: 42
          - solver: [random]
            n_components: 50
            random_seed: &pca_seeds [42, 1, 2, 3, 4, 5, 6, 7, 8, 9]
      - id: pca-scanpy
        name: "scanpy PCA"
        software_environment: "scanpy"
        repository:
          url: ../split-stages-plan-modules/scanpy
          commit: center-only
          entrypoint: pca
        parameters:
          - solver: [arpack]
            n_components: 50
            random_seed: 42
            chunked: "false"
          - solver: [randomized]
            n_components: 50
            random_seed: *pca_seeds
            chunked: "false"
          - n_components: 50
            random_seed: 42
            chunked: "true"
            chunk_size: 10000
      - id: pca-seurat
        name: "seurat PCA"
        software_environment: "seurat"
        repository:
          url: ../split-stages-plan-modules/seurat
          commit: center-only
          entrypoint: pca
        parameters:
          - solver: [exact]
            n_components: 50
            random_seed: 42
          - solver: [approximate]
            n_components: 50
            random_seed: *pca_seeds
      # GPU serialization required for pca-rapids
      # ----------------------------------------
      # rapids-singlecell reinitializes RMM with a non-pooled, non-managed
      # allocator (see split-stages-plan-modules/rapids-singlecell/src/gpu.py)
      # so VRAM accounting reflects the true working set rather than a hidden
      # pool. Side effect: concurrent rapids jobs OOM each other on a single
      # GPU because there's nothing to reclaim from.
      #
      # The `resources: gpu: 1` declaration below emits
      # `resources: nvidia_gpu=1` on the snakemake rule, but Snakemake only
      # enforces it if you ALSO pass a global cap. Run with:
      #
      #     ob run benchmark_conda.yaml -- --resources nvidia_gpu=1
      #
      # Without that flag, snakemake treats nvidia_gpu as unbounded and
      # schedules rapids jobs in parallel — they will OOM as before.
      - id: pca-rapids
        name: "rapids-singlecell PCA"
        software_environment: "rapids-singlecell"
        resources:
          gpu: 1
        repository:
          url: ../split-stages-plan-modules/rapids-singlecell
          commit: center-only
          #  entrypoint: pca
          entrypoint: pca-prof
        parameters:
          # rapids -> cuML default (auto). For our sparse zero-centered input
          # rsc routes to covariance_eigh -> deterministic. Seed is a no-op,
          # so pinned to 42 (no sweep).
          - solver: [rapids]
            n_components: 50
            random_seed: 42
          # rapids-exact -> svd_solver="full" on GPU; deterministic, seed is
          # a no-op (kept at 42, no sweep). Lets us compare a GPU exact SVD
          # against scrapper/seurat exact at the solver level.
          - solver: [rapids-exact]
            n_components: 50
            random_seed: 42
          # rapids-randomized -> svd_solver="randomized" on GPU; genuinely
          # seed-dependent (power iteration + Gaussian sketch). Parallels
          # scanpy/randomized and scrapper/random.
          - solver: [rapids-randomized]
            n_components: 50
            random_seed: *pca_seeds

  # Parallel PCA branch consuming the BPCells-converted matrix produced by
  # five-pre-bpcells. Output id `pcas.tsv` matches five-pca's so downstream
  # six-embedding-metrics fans out naturally over both branches.
  - id: five-pca-bpcells
    resources:
      cores: 4
    inputs:
      - bpcells.tar.gz
    outputs:
      - id: pcas.tsv
        path: "{dataset}_pcas.tsv"
    modules:
      - id: pca-seurat-bpcells
        name: "seurat PCA (BPCells-backed)"
        software_environment: "seurat-bpcells"
        repository:
          url: ../split-stages-plan-modules/seurat
          commit: center-only
          entrypoint: pca
        parameters:
          - solver: [bpcells-exact]
            n_components: 50
            random_seed: 42
          - solver: [bpcells-approximate]
            n_components: 50
            random_seed: *pca_seeds

  - id: six-embedding-metrics
    inputs:
      - pcas.tsv
      - rawdata.clusters_truth
    outputs:
      - id: embedding_metrics
        path: "{dataset}_embedding_metrics.json"
    modules:
      - id: embedding-metrics-py
        name: "Embedding quality metrics in python"
        software_environment: "metrics"
        repository:
          url: https://github.com/omni-scrna/metrics
          commit: 0d0050e
          entrypoint: embedding-py
      #       - id: embedding-metrics-r
      #         name: "Embedding quality metrics in R"
      #         software_environment: "metrics"
      #         repository:
      #           url: https://github.com/omni-scrna/metrics
      #           commit: 0d0050e
      #           entrypoint: embedding-r

