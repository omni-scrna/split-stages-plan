# Main Seurat env (anndatar-backed). For the BPCells variants see
# envs/seurat-bpcells.yml — r-bpcells pins r-base 4.4 while anndatar pins
# r-base 4.5, so they cannot coexist in one env.
# obkit's R logger is vendored under src/obkit_logger.R because r-obkit on
# prefix.dev/edge pins r-base to 4.5 in a way that conflicted historically;
# re-add r-obkit + the prefix.dev/edge channel once a compatible build exists.
# Keep in sync if regenerating via `pixi run export-env`.
name: seurat
channels:
- conda-forge
- bioconda
- nodefaults
dependencies:
- r-base >=4.5
- r-seurat >=5.0.0
- bioconductor-anndatar *
- bioconductor-rhdf5 *
- bioconductor-hdf5array *
- r-data.table *
- r-optparse *
- r-magrittr *
