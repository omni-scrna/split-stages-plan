name: metrics
channels:
  - conda-forge
  - bioconda
  - https://repo.prefix.dev/almost-conductor
  - nodefaults
dependencies:
  - python >=3.12,<3.14  # numba (scib-metrics -> pynndescent/umap-learn) has no cp314 wheels yet
  - scikit-learn *
  - h5py *
  - numpy <2.5  # numba (scib-metrics -> pynndescent/umap-learn) has no numpy>=2.5 support yet
  - polars *
  - r-base >=4.5,<4.6.0
  - r-argparser *
  - r-jsonlite *
  - r-data.table *
  - r-igraph *
  - r-matrix *
  - bioconductor-biocversion 3.22.*
  - bioconductor-hdf5array *
  - bioconductor-rhdf5 *
  - bioconductor-poem *
  - imagemagick=7.1.2_25 # o/w poem does not load
  - r-pdist=1.2.1
  - r-aricode=1.0.3 
  - r-data.table *
  - r-mlmetrics *
  - bioconductor-cellmixs *
  - bioconductor-rhdf5 *
  - r-yaml *
  - pip
  - pyyaml *
  - pip:
    - scib-metrics
