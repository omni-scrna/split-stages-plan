name: metrics
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python >=3.12
  - scikit-learn *
  - h5py *
  - numpy *
  - polars *
  - r-base >=4.5
  - r-argparse *
  - r-jsonlite *
  - r-data.table *
  - r-igraph *
  - r-matrix *
  - bioconductor-biocversion 3.22.*
  - bioconductor-hdf5array *
  - bioconductor-poem *
  - bioconductor-rhdf5 *
